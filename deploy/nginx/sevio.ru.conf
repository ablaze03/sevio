server {
    server_name sevio.ru www.sevio.ru;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location ~* \.(sqlite|db|csv|xlsx|zip)$ {
        deny all;
        return 404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sevio.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sevio.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.sevio.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = sevio.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name sevio.ru www.sevio.ru;
    return 404; # managed by Certbot




}